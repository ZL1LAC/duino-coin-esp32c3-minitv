name: Firmware

on:
  push:
    tags:
      - 'firmware-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  list-boards:
    runs-on: ubuntu-latest
    outputs:
      boards: ${{ steps.set-matrix.outputs.boards }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          boards=$(python3 scripts/registry.py list | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "boards=${boards}" >> "$GITHUB_OUTPUT"

  build:
    needs: list-boards
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJson(needs.list-boards.outputs.boards) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools and Arduino toolchain
        run: |
          pip install esptool
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> "$GITHUB_PATH"
          export PATH="$PWD/bin:$PATH"
          arduino-cli config init
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install "ArduinoJson" "WiFiManager" "TFT_eSPI" "U8g2" "GxEPD2" "Adafruit GFX Library"

      - name: Build ${{ matrix.board }}
        env:
          SKIP_DEPS: "1"
        run: |
          chmod +x scripts/*.sh
          bash scripts/build-firmware.sh "${{ matrix.board }}"

      - name: Stage release files for ${{ matrix.board }}
        run: |
          dist="firmware/dist/${{ matrix.board }}"
          out="release-assets/${{ matrix.board }}"
          mkdir -p "$out"
          cp "$dist"/*-merged-flash.bin "$out/${{ matrix.board }}-firmware.bin"
          cp "$dist/manifest.json" "$out/${{ matrix.board }}-manifest.json"
          cp "$dist/FLASH.txt" "$out/${{ matrix.board }}-FLASH.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: release-assets/${{ matrix.board }}/

  release:
    if: startsWith(github.ref, 'refs/tags/firmware-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: firmware-*
          merge-multiple: true

      - name: Flatten release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*-firmware.bin' -o -name '*-manifest.json' -o -name '*-FLASH.txt' \) -exec cp {} release/ \;
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Firmware ${{ github.ref_name }}
          body: |
            Pre-built flash images — **no Settings.h required** (captive portal on first boot).

            | Device | Flash this file |
            |--------|-----------------|
            | Spotpear ESP32-C3 Mini TV | `esp32c3-minitv-firmware.bin` |
            | ESP32-2424S012 round | `esp32c3-round128-firmware.bin` |
            | LilyGO T-Deck | `lilygo-t-deck-firmware.bin` |
            | Heltec WiFi LoRa 32 (V2) | `heltec-wifi-lora-32-v2-firmware.bin` |
            | LilyGO T-Deck Pro | `lilygo-t-deck-pro-firmware.bin` |

            Flash at address **0x0** — per-device `*-FLASH.txt` in assets or [docs/FLASH.md](https://github.com/${{ github.repository }}/blob/master/docs/FLASH.md).
          files: release/*
          generate_release_notes: false
